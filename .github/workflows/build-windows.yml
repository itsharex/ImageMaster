name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Also publish this build to GitHub Releases"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag for manual publish, e.g. v0.3.0"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@8.15.8 --activate
          pnpm --version

      - name: Install frontend dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      - name: Resolve build version
        id: version
        shell: pwsh
        run: |
          $rawTag = ""
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}") {
            $rawTag = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.publish_release }}" -eq "true" -and "${{ github.event.inputs.release_tag }}") {
            $rawTag = "${{ github.event.inputs.release_tag }}"
          }

          $rawTag = $rawTag.Trim()

          if ($rawTag) {
            if (-not $rawTag.StartsWith("v")) {
              $rawTag = "v$rawTag"
            }
            $version = $rawTag.Substring(1)
          } else {
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $version = "dev-${{ github.run_number }}-$shortSha"
          }

          $version = $version.Trim()
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$rawTag" >> $env:GITHUB_OUTPUT
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "BUILD_COMMIT=${{ github.sha }}" >> $env:GITHUB_ENV
          "BUILD_TIME=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssK')" >> $env:GITHUB_ENV

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ldflags = "-X main.AppVersion=$env:APP_VERSION -X main.BuildCommit=$env:BUILD_COMMIT -X main.BuildTime=$env:BUILD_TIME"
          wails build -clean -platform windows/amd64 -webview2 download -ldflags "$ldflags"

      - name: Build JM runtime helper
        shell: pwsh
        run: |
          ./scripts/build_jm_runtime.ps1 -PythonExe py -PythonVersionArg -3.11 -RuntimeVersion $env:APP_VERSION -BuildTime $env:BUILD_TIME
          New-Item -ItemType Directory -Force -Path "build/bin/runtime" | Out-Null
          Copy-Item -Force "runtime/imagemaster-jm-runtime.exe" "build/bin/runtime/imagemaster-jm-runtime.exe"
          Copy-Item -Force "runtime/runtime-manifest.json" "build/bin/runtime/runtime-manifest.json"

      - name: Bundle source manifests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/bin/sources" | Out-Null
          Copy-Item -Recurse -Force "sources/*" "build/bin/sources"

      - name: Package release zip
        shell: pwsh
        run: |
          $packageRoot = "build/package/ImageMaster-$env:APP_VERSION-windows-amd64"
          $zipPath = "build/ImageMaster-$env:APP_VERSION-windows-amd64.zip"
          if (Test-Path $packageRoot) {
            Remove-Item -Recurse -Force $packageRoot
          }
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Recurse -Force "build/bin/*" $packageRoot
          Compress-Archive -Path $packageRoot -DestinationPath $zipPath

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ImageMaster-windows-amd64-${{ steps.version.outputs.app_version }}
          path: |
            build/bin/**
            build/ImageMaster-${{ steps.version.outputs.app_version }}-windows-amd64.zip
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            build/ImageMaster-${{ steps.version.outputs.app_version }}-windows-amd64.zip
          generate_release_notes: true
